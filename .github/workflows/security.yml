name: Bandit Security Scan

# Запускать workflow при каждом push
on:
  push:
    branches:
      - main
      - master
      # Раскомментируйте следующие строки, если хотите запускать и на Pull Requests
      # - pull_request

jobs:
  bandit:
    name: Run Bandit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12' # Укажите версию Python, актуальную для вашего проекта
          cache: 'pip'           # Кэширование пакетов для ускорения сборки

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit Scan
        # Запускаем рекурсивно (-r) по всей текущей директории (.)
        run: bandit -r . -ll
